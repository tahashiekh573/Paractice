<!DOCTYPE html>
<html>
<head>
  <title>Electric AR Hand Drawing</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    video {
      position: absolute;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
      opacity: 0; /* camera hidden */
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #00f7ff;
      font-family: Arial;
      z-index: 10;
    }
  </style>
</head>

<body>

<div id="ui">⚡ Draw = Index finger | ✋ Palm = Clear screen</div>

<video id="video" autoplay></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// persistent drawing layer (IMPORTANT FIX)
const drawCanvas = document.createElement("canvas");
const drawCtx = drawCanvas.getContext("2d");

drawCanvas.width = canvas.width;
drawCanvas.height = canvas.height;

let lastX = 0;
let lastY = 0;
let drawing = false;
let hue = 0;
let brush = 5;

// ✋ palm detection
function isOpenPalm(hand) {
  const tips = [8,12,16,20];
  const pips = [6,10,14,18];

  let open = 0;
  for (let i = 0; i < tips.length; i++) {
    if (hand[tips[i]].y < hand[pips[i]].y) open++;
  }
  return open >= 3;
}

// ⚡ electric draw
function draw(x, y) {

  hue += 2;
  if (hue > 360) hue = 0;

  const color = `hsl(${hue},100%,60%)`;

  drawCtx.strokeStyle = color;
  drawCtx.shadowBlur = 45;
  drawCtx.shadowColor = color;
  drawCtx.lineWidth = brush;
  drawCtx.lineCap = "round";

  drawCtx.beginPath();
  drawCtx.moveTo(lastX, lastY);
  drawCtx.lineTo(x, y);
  drawCtx.stroke();

  // ⚡ electric sparks
  for (let i = 0; i < 5; i++) {
    let angle = Math.random() * Math.PI * 2;
    let r = Math.random() * 12;

    drawCtx.beginPath();
    drawCtx.fillStyle = "#00f7ff";
    drawCtx.shadowBlur = 20;
    drawCtx.shadowColor = "#00f7ff";
    drawCtx.arc(x + Math.cos(angle)*r, y + Math.sin(angle)*r, 2, 0, Math.PI*2);
    drawCtx.fill();
  }

  // ⚡ lightning jitter
  drawCtx.beginPath();
  drawCtx.strokeStyle = "#ffffff";
  drawCtx.moveTo(lastX, lastY);
  drawCtx.lineTo(
    x + (Math.random()*6 - 3),
    y + (Math.random()*6 - 3)
  );
  drawCtx.stroke();

  lastX = x;
  lastY = y;
}

// MediaPipe
const hands = new Hands({
  locateFile: (file) =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.8,
  minTrackingConfidence: 0.8,
});

hands.onResults((results) => {

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // render saved drawing
  ctx.drawImage(drawCanvas,0,0);

  if (!results.multiHandLandmarks) return;

  const hand = results.multiHandLandmarks[0];

  // skeleton
  drawConnectors(ctx, hand, HAND_CONNECTIONS, {
    color: "#00e5ff",
    lineWidth: 2
  });

  drawLandmarks(ctx, hand, {
    color: "#ffffff",
    lineWidth: 1
  });

  // ✋ clear screen gesture
  if (isOpenPalm(hand)) {
    drawCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
    return;
  }

  const x = hand[8].x * canvas.width;
  const y = hand[8].y * canvas.height;

  const thumb = hand[4];
  const index = hand[8];

  let dist = Math.hypot(
    thumb.x - index.x,
    thumb.y - index.y
  );

  // ✊ stop drawing (fist)
  if (dist < 0.05) {
    drawing = false;
    return;
  }

  if (!drawing) {
    lastX = x;
    lastY = y;
    drawing = true;
  } else {
    draw(x,y);
  }
});

// camera
const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({ image: video });
  },
  width: 1280,
  height: 720,
});

camera.start();
</script>

</body>
</html>
