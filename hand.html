<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Air Writing Stable Fix</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
}

video{
    position:fixed;
    width:1px;
    height:1px;
    opacity:0;
}

canvas{
    position:fixed;
    top:0;
    left:0;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* 👉 IMPORTANT: per-hand memory */
let last = {
    Left: null,
    Right: null
};

/* ===== ELECTRIC DRAW ===== */
function draw(x1,y1,x2,y2){
    ctx.strokeStyle = "#00ffff";
    ctx.lineWidth = 5;
    ctx.lineCap = "round";

    ctx.shadowBlur = 20;
    ctx.shadowColor = "#00ffff";

    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x2,y2);
    ctx.stroke();

    ctx.shadowBlur = 0;
}

/* ===== HANDS ===== */
const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
    maxNumHands:2,
    modelComplexity:1,
    minDetectionConfidence:0.75,
    minTrackingConfidence:0.75
});

hands.onResults(onResults);

/* ===== CORE LOGIC ===== */
function onResults(results){

    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    if(!results.multiHandLandmarks) return;

    for(let i=0;i<results.multiHandLandmarks.length;i++){

        const lm = results.multiHandLandmarks[i];
        const hand = results.multiHandedness[i].label; // LEFT / RIGHT

        drawConnectors(ctx,lm,HAND_CONNECTIONS,{
            color:"#00ffff",
            lineWidth:2
        });

        drawLandmarks(ctx,lm,{
            color:"#ff00ff",
            lineWidth:1
        });

        // 👉 NO MIRROR FLIP (THIS WAS MAIN BUG)
        let x = lm[8].x * canvas.width;
        let y = lm[8].y * canvas.height;

        // 👉 stability key
        let key = hand;

        if(last[key]){
            draw(last[key].x,last[key].y,x,y);
        }

        last[key] = {x,y};
    }
}

/* ===== CAMERA ===== */
const camera = new Camera(video,{
    onFrame: async ()=>{
        await hands.send({image:video});
    },
    width:640,
    height:480
});

camera.start();

</script>

</body>
</html>
