<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Air Writing App</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        font-family: Arial, sans-serif;
    }

    /* LIVE CAMERA BACKGROUND */
    video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: 0;
        transform: scaleX(-1); /* mirror like mirror view */
    }

    canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
        pointer-events: none;
    }

    #ui {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 2;
        background: rgba(0,0,0,0.5);
        padding: 10px;
        border-radius: 10px;
        backdrop-filter: blur(10px);
        color: white;
    }

    input { margin: 5px 0; }
</style>
</head>
<body>

<div id="ui">
    <label>Color:</label>
    <input type="color" id="colorPicker" value="#00ffff" /><br/>

    <label>Brush Size:</label>
    <input type="range" id="brushSize" min="2" max="40" value="6" />
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const videoElement = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let drawing = true;
let lastX = null;
let lastY = null;

const colorPicker = document.getElementById('colorPicker');
const brushSize = document.getElementById('brushSize');

function getFingerState(lm) {
    return {
        fingers: [
            lm[8].y < lm[6].y,
            lm[12].y < lm[10].y,
            lm[16].y < lm[14].y,
            lm[20].y < lm[18].y
        ]
    };
}

function isFist(state) {
    return state.fingers.every(f => !f);
}

function isOpenPalm(state) {
    return state.fingers.every(f => f);
}

function isIndexOnly(state) {
    return state.fingers[0] && !state.fingers[1] && !state.fingers[2] && !state.fingers[3];
}

function drawGlow(x1,y1,x2,y2,color,size){
    ctx.strokeStyle = color;
    ctx.lineWidth = size;
    ctx.lineCap = "round";

    ctx.shadowBlur = 20;
    ctx.shadowColor = color;

    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x2,y2);
    ctx.stroke();

    ctx.shadowBlur = 0;
}

const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.7
});

hands.onResults(onResults);

function onResults(results) {
    if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        lastX = lastY = null;
        return;
    }

    const lm = results.multiHandLandmarks[0];
    const state = getFingerState(lm);

    // USE VIDEO SIZE (FIX ACCURACY ISSUE)
    const vw = videoElement.videoWidth || window.innerWidth;
    const vh = videoElement.videoHeight || window.innerHeight;

    let x = (1 - lm[8].x) * window.innerWidth; // mirror fix
    let y = lm[8].y * window.innerHeight;

    if (isFist(state)) {
        drawing = false;
        lastX = lastY = null;
        return;
    }

    if (isOpenPalm(state)) {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        lastX = lastY = null;
        return;
    }

    if (!isIndexOnly(state)) return;

    drawing = true;

    if (lastX !== null) {
        drawGlow(lastX,lastY,x,y,colorPicker.value,brushSize.value);
    }

    lastX = x;
    lastY = y;
}

const camera = new Camera(videoElement, {
    onFrame: async () => {
        await hands.send({image: videoElement});
    },
    width: 640,
    height: 480
});
camera.start();
</script>

</body>
</html>
