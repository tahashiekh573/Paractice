<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Air Draw — Gesture-Based Doodler</title>
    <meta
      name="description"
      content="Draw in the air with hand gestures using computer vision. A gesture-based interactive doodler powered by MediaPipe."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="/assets/index-CKDcvLzF.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="loading-screen">
      <div class="loader-content">
        <img src="images.png" alt="Air Draw" class="loader-logo" />
        <p class="loader-subtitle">Initializing hand tracking...</p>
        <div class="loader-bar">
          <div class="loader-bar-fill"></div>
        </div>
      </div>
    </div>

    <div id="app" class="hidden">
      <video id="webcam" autoplay playsinline></video>

      <canvas id="camera-canvas"></canvas>
      <canvas id="drawing-canvas"></canvas>
      <canvas id="ui-canvas"></canvas>

      <div id="gesture-hud">
        <div id="gesture-icon">✊</div>
        <div id="gesture-label">Ready</div>
      </div>

      <div id="toolbar">
        <div class="toolbar-section toolbar-section--colors">
          <label class="toolbar-label">Colors</label>
          <div id="color-picker-toggle">
            <button
              class="color-swatch active"
              data-color="#00f0ff"
              style="--swatch-color: #00f0ff"
              title="Cyan"
              id="active-color-preview"
            ></button>
          </div>
          <div id="color-palette">
            <button
              class="color-swatch active"
              data-color="#00f0ff"
              style="--swatch-color: #00f0ff"
              title="Cyan"
            ></button>
            <button
              class="color-swatch"
              data-color="#ff00e5"
              style="--swatch-color: #ff00e5"
              title="Magenta"
            ></button>
            <button
              class="color-swatch"
              data-color="#39ff14"
              style="--swatch-color: #39ff14"
              title="Lime"
            ></button>
            <button
              class="color-swatch"
              data-color="#4d6dff"
              style="--swatch-color: #4d6dff"
              title="Electric Blue"
            ></button>
            <button
              class="color-swatch"
              data-color="#ff2d6b"
              style="--swatch-color: #ff2d6b"
              title="Hot Pink"
            ></button>
            <button
              class="color-swatch"
              data-color="#ffd700"
              style="--swatch-color: #ffd700"
              title="Gold"
            ></button>
            <button
              class="color-swatch"
              data-color="#b400ff"
              style="--swatch-color: #b400ff"
              title="Purple"
            ></button>
            <button
              class="color-swatch"
              data-color="#ffffff"
              style="--swatch-color: #ffffff"
              title="White"
            ></button>
          </div>
        </div>

        <div class="toolbar-divider"></div>

        <div class="toolbar-section toolbar-section--sliders">
          <label class="toolbar-label" for="thickness-slider">Thickness</label>
          <input
            type="range"
            id="thickness-slider"
            min="2"
            max="24"
            value="6"
          />
          <span id="thickness-value" class="slider-value">6px</span>
        </div>

        <div class="toolbar-divider"></div>

        <div class="toolbar-section toolbar-section--sliders">
          <label class="toolbar-label" for="glow-slider">Glow</label>
          <input type="range" id="glow-slider" min="0" max="100" value="60" />
          <span id="glow-value" class="slider-value">60%</span>
        </div>

        <div class="toolbar-divider"></div>

        <div class="toolbar-actions">
          <button id="btn-undo" class="toolbar-btn" title="Undo last stroke">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path
                d="M12.5 8c-2.65 0-5.05 1.04-6.83 2.73L2.5 7.5v9h9l-3.19-3.19c1.3-1.3 3.1-2.11 5.19-2.11 3.45 0 6.35 2.37 7.16 5.57l2.27-.71C21.69 12.11 17.52 8 12.5 8z"
                fill="currentColor"
              />
            </svg>
          </button>
          <button id="btn-clear" class="toolbar-btn" title="Clear canvas">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path
                d="M19 4h-3.5l-1-1h-5l-1 1H5v2h14M6 19a2 2 0 002 2h8a2 2 0 002-2V7H6v12z"
                fill="currentColor"
              />
            </svg>
          </button>
          <button
            id="btn-camera-toggle"
            class="toolbar-btn active"
            title="Toggle camera view"
          >
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"
                fill="currentColor"
              />
              <circle
                cx="12"
                cy="12"
                r="3"
                fill="currentColor"
                class="cam-dot"
              />
            </svg>
          </button>
          <button id="btn-save" class="toolbar-btn" title="Save as PNG">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path
                d="M19 12v7H5v-7H3v7c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-7h-2zm-6 .67l2.59-2.58L17 11.5l-5 5-5-5 1.41-1.41L11 12.67V3h2v9.67z"
                fill="currentColor"
              />
            </svg>
          </button>
        </div>
      </div>

      <div id="camera-mode-indicator">
        <span id="camera-mode-text">Camera ON</span>
      </div>

      <div id="creator-handle">
        <span class="handle-text">built by <strong>Shiekh Taha</strong></span>
        <div class="handle-links">
          <a
            href=""
            target="_blank"
            rel="noopener noreferrer"
            title="Instagram"
          >
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
              <path
                d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"
              />
            </svg>
          </a>
          <a
            href=""
            target="_blank"
            rel="noopener noreferrer"
            title="Twitter / X"
          >
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
              <path
                d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"
              />
            </svg>
          </a>
        </div>
      </div>
    </div>

    <div id="onboarding-modal" class="hidden">
      <div class="onboarding-content">
        <img src="images.png" alt="Air" class="onboarding-logo" />
        <h2 class="onboarding-title">How to Play</h2>
        <div class="onboarding-grid">
          <div class="onboarding-item">
            <div class="onboarding-icon">☝️</div>
            <div class="onboarding-text">
              <strong>Draw</strong>
              <span>Point index finger to draw</span>
            </div>
          </div>
          <div class="onboarding-item">
            <div class="onboarding-icon">✋</div>
            <div class="onboarding-text">
              <strong>Erase</strong>
              <span>Sweep open palm to erase</span>
            </div>
          </div>
          <div class="onboarding-item">
            <div class="onboarding-icon">🤏</div>
            <div class="onboarding-text">
              <strong>Move</strong>
              <span>Pinch to grab & reposition</span>
            </div>
          </div>
          <div class="onboarding-item">
            <div class="onboarding-icon">✊</div>
            <div class="onboarding-text">
              <strong>Idle</strong>
              <span>Close fist to rest</span>
            </div>
          </div>
        </div>
        <button id="btn-start" class="btn-primary">Let's Go!</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
